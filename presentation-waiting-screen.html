<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Waiting Screen | Families for Education</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="img/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #00234B;
      --navy-deep: #001530;
      --gold: #E8A020;
      --red: #C8102E;
      --white: #FFFFFF;
      --mist: rgba(255, 255, 255, 0.82);
      --glass: rgba(0, 21, 48, 0.44);
      --glass-strong: rgba(0, 21, 48, 0.72);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.25);
      --slide-duration: 14s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(232, 160, 32, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(200, 16, 46, 0.14), transparent 32%),
        linear-gradient(135deg, #001127 0%, #00234b 52%, #001937 100%);
      color: var(--white);
      position: relative;
    }

    .slideshow {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #001127;
    }

    .slide {
      position: absolute;
      inset: -4%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      opacity: 0;
      transform: scale(1.02);
      transition: opacity 1.8s ease-in-out;
      animation: drift var(--slide-duration) ease-in-out infinite alternate;
      filter: saturate(1.04) contrast(1.02);
    }

    .slide::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 16, 38, 0.24) 0%, rgba(0, 16, 38, 0.5) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.35) 0%, transparent 45%, rgba(0, 0, 0, 0.28) 100%);
    }

    .slide.is-active {
      opacity: 1;
    }

    .frame {
      position: relative;
      min-height: 100vh;
      display: grid;
      align-items: end;
      padding: 3.5rem;
      isolation: isolate;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 28px;
      pointer-events: none;
    }

    .content {
      width: min(450px, 100%);
      display: grid;
      gap: 0.85rem;
      padding: 1.15rem 1.2rem 1.15rem;
      background: linear-gradient(180deg, rgba(0, 21, 48, 0.34) 0%, rgba(0, 21, 48, 0.64) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 12px 20px rgba(0, 0, 0, 0.2));
    }

    .brand-copy {
      display: grid;
      gap: 0.25rem;
    }

    .eyebrow {
      color: var(--gold);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .brand-copy strong {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1rem, 1.4vw, 1.3rem);
      font-weight: 700;
      line-height: 1.05;
    }

    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.7rem, 3.4vw, 2.9rem);
      line-height: 0.98;
      max-width: 8ch;
    }

    .headline span {
      color: var(--gold);
    }

    .description {
      font-size: 0.88rem;
      line-height: 1.45;
      color: var(--mist);
      max-width: 28rem;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.1rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 0.82rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 0.8rem;
      color: var(--mist);
    }

    .status-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 0 0 rgba(232, 160, 32, 0.65);
      animation: pulse 2.4s ease-out infinite;
    }

    .clock {
      font-variant-numeric: tabular-nums;
      font-size: clamp(0.88rem, 1vw, 0.98rem);
      font-weight: 600;
      color: var(--white);
      letter-spacing: 0.04em;
    }

    .progress {
      position: fixed;
      left: 32px;
      right: 32px;
      bottom: 22px;
      height: 4px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.16);
      z-index: 3;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, var(--gold) 0%, #f3c362 52%, #fff2cf 100%);
      animation: progressFill var(--slide-duration) linear infinite;
    }

    .caption {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 3;
      max-width: min(340px, calc(100vw - 64px));
      padding: 0.75rem 0.9rem;
      background: rgba(0, 21, 48, 0.44);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      text-align: right;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.2);
    }

    .caption-label {
      display: block;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 0.35rem;
    }

    .caption-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(0.92rem, 1.5vw, 1.15rem);
      line-height: 1.3;
    }

    .hint {
      position: fixed;
      right: 32px;
      bottom: 34px;
      z-index: 3;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.04em;
    }

    @keyframes drift {
      from { transform: scale(1.03) translate3d(0, 0, 0); }
      to { transform: scale(1.1) translate3d(1.8%, -1.4%, 0); }
    }

    @keyframes progressFill {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0.68); }
      70% { box-shadow: 0 0 0 12px rgba(232, 160, 32, 0); }
      100% { box-shadow: 0 0 0 0 rgba(232, 160, 32, 0); }
    }

    @media (max-width: 900px) {
      .frame {
        padding: 1.25rem;
      }

      .frame::before {
        inset: 12px;
        border-radius: 20px;
      }

      .content {
      padding: 1.2rem;
      border-radius: 22px;
    }

    .brand img {
        width: 48px;
        height: 48px;
      }

      .headline {
        max-width: none;
      }

      .caption {
        top: 18px;
        right: 18px;
        left: 18px;
        max-width: none;
        text-align: left;
      }

      .progress {
        left: 18px;
        right: 18px;
        bottom: 18px;
      }

      .hint {
        left: 18px;
        right: 18px;
        bottom: 32px;
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .progress-bar,
      .status-pill::before {
        animation: none;
      }

      .slide {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="slideshow" id="slideshow" aria-hidden="true"></div>

  <div class="caption" aria-live="polite">
    <span class="caption-label">Current Image</span>
    <div class="caption-text" id="captionText">Families gathering together</div>
  </div>

  <main class="frame">
    <section class="content">
      <div class="brand">
        <img src="img/rosewood-emblem-corrected-transparent.png" alt="Families for Education emblem">
        <div class="brand-copy">
          <span class="eyebrow">Presentation Mode</span>
          <strong>Families for Education</strong>
        </div>
      </div>

      <h1 class="headline">Welcome. <span>Starting soon.</span></h1>

      <p class="description">
        Please take a moment to settle in.
      </p>

      <div class="status-row">
        <div class="status-pill">Preparing the room for the next presentation</div>
        <div class="clock" id="clock" aria-label="Current time"></div>
      </div>
    </section>
  </main>

  <div class="progress" aria-hidden="true">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="hint">Tip: use browser fullscreen for projector mode.</div>

  <script>
    const slides = [
      {
        src: "img/Aerial land photo.png",
        caption: "178-202 Highett Road, Melton - the future school site"
      },
      {
        src: "img/picnic collage.png",
        caption: "April 2026 family picnic - real founding families and friends"
      },
      {
        src: "img/ideals-anne-marie.png",
        caption: "A previous Ideals in Teaching evening with Dr Anne-Marie Irwin presenting the SALT approach"
      },
      {
        src: "img/Creating Joyful Homes.png",
        caption: "Creating Joyful Christian Homes - part of the Ideals in Teaching series on faith, family, and formation"
      },
      {
        src: "img/ideals theology.png",
        caption: "Theology of the Body evening - families learning together"
      },
      {
        src: "img/mentoring ideals.png",
        caption: "Ideals in Teaching - mentoring, virtue, and school community"
      }
    ];

    const slideDurationMs = 14000;
    const slideshow = document.getElementById("slideshow");
    const captionText = document.getElementById("captionText");
    const progressBar = document.getElementById("progressBar");
    const clock = document.getElementById("clock");

    let activeIndex = 0;
    let renderedSlides = [];
    let rotationTimerId = null;

    function renderSlides() {
      slides.forEach((slide, index) => {
        const element = document.createElement("div");
        element.className = "slide";
        element.style.backgroundImage = "url(\"" + slide.src.replace(/"/g, '\\"') + "\")";
        if (index === 0) {
          element.classList.add("is-active");
        }
        slideshow.appendChild(element);
        renderedSlides.push(element);
      });

      captionText.textContent = slides[0].caption;
    }

    function restartProgress() {
      progressBar.style.animation = "none";
      void progressBar.offsetWidth;
      progressBar.style.animation = "progressFill var(--slide-duration) linear infinite";
    }

    function showSlide(index) {
      renderedSlides[activeIndex].classList.remove("is-active");
      activeIndex = index;
      renderedSlides[activeIndex].classList.add("is-active");
      captionText.textContent = slides[activeIndex].caption;
      restartProgress();
    }

    function rotateSlides() {
      const nextIndex = (activeIndex + 1) % slides.length;
      showSlide(nextIndex);
    }

    function rotateSlidesBackward() {
      const previousIndex = (activeIndex - 1 + slides.length) % slides.length;
      showSlide(previousIndex);
    }

    function restartRotationTimer() {
      if (rotationTimerId !== null) {
        window.clearInterval(rotationTimerId);
      }
      rotationTimerId = window.setInterval(rotateSlides, slideDurationMs);
    }

    function updateClock() {
      const now = new Date();
      clock.textContent = now.toLocaleTimeString("en-AU", {
        hour: "numeric",
        minute: "2-digit"
      });
    }

    renderSlides();
    updateClock();
    restartProgress();

    restartRotationTimer();
    window.setInterval(updateClock, 1000);

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight") {
        rotateSlides();
        restartRotationTimer();
      } else if (event.key === "ArrowLeft") {
        rotateSlidesBackward();
        restartRotationTimer();
      }
    });
  </script>
</body>
</html>
