<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to Families for Education Donate</title>
  <meta http-equiv="refresh" content="0; url=https://ffe.org.au/donate.html">
  <link rel="canonical" href="https://ffe.org.au/donate.html">
  <meta name="robots" content="noindex">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: #f5f1e8;
      color: #0f2747;
      font-family: "Inter", "Segoe UI", sans-serif;
    }

    .redirect-card {
      max-width: 36rem;
      padding: 2rem;
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 16px 40px rgba(15, 39, 71, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 1rem;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 1rem;
      line-height: 1.6;
    }

    a {
      color: #8b6b2e;
      font-weight: 600;
    }
  </style>
  <script>
    window.location.replace("https://ffe.org.au/donate.html");
  </script>
</head>
<body>
  <main class="redirect-card">
    <h1>Redirecting to our current donation page</h1>
    <p>The old Trivia Night donation page has moved to the main Families for Education donation page.</p>
    <p>If you are not redirected automatically, <a href="https://ffe.org.au/donate.html">continue to donate here</a>.</p>
  </main>
</body>
</html>
