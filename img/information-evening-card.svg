<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="infoShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#13283E" stop-opacity="0.88"/>
      <stop offset="0.45" stop-color="#13283E" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#13283E" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="infoWarm" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#C65431" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E6BE6E" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <image href="Aerial land photo.png" x="0" y="0" width="1600" height="900" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1600" height="900" fill="url(#infoShade)"/>
  <rect width="1600" height="900" fill="url(#infoWarm)"/>

  <rect x="78" y="88" width="228" height="42" rx="21" fill="#F4E8D2" fill-opacity="0.96"/>
  <text x="192" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" letter-spacing="2.4" fill="#13283E">AUG 2025</text>

  <text x="90" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#FFF9F0">Information</text>
  <text x="90" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="700" fill="#FFF9F0">Evening</text>

  <text x="90" y="446" font-family="Arial, sans-serif" font-size="31" font-weight="600" fill="#F4E8D2">Introducing the vision for a new school</text>
  <text x="90" y="488" font-family="Arial, sans-serif" font-size="31" font-weight="600" fill="#F4E8D2">for families in Melbourne's West</text>

  <rect x="90" y="558" width="454" height="3" fill="#E6BE6E"/>
  <text x="90" y="626" font-family="Arial, sans-serif" font-size="25" font-weight="500" fill="#FFF9F0" opacity="0.95">Families gathering to hear the story, the site,</text>
  <text x="90" y="662" font-family="Arial, sans-serif" font-size="25" font-weight="500" fill="#FFF9F0" opacity="0.95">and the path toward opening in 2027.</text>
</svg>
